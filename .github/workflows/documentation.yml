name: Documentation

on:
  push:
    branches:
      - main
    tags: ['*']
  pull_request:

jobs:
  build:
    permissions:
      contents: write
      pages: write
      id-token: write
      statuses: write
      pull-requests: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: julia-actions/setup-julia@v2
        with:
          version: '1'

      - uses: julia-actions/cache@v2

      - name: Instantiate docs environment
        run: |
          julia --project=code/docs -e '
            using Pkg
            Pkg.develop(PackageSpec(path="code"))
            Pkg.instantiate()
          '

      - name: Build and deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: julia --project=code/docs code/docs/make.jl
